<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 幸運抽獎機</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');

  :root {
    --gold: #FFD166;
    --deep: #0D0D1A;
    --card: #13132A;
    --surface: #1C1C38;
    --accent: #FF6B9D;
    --blue: #06D6A0;
    --purple: #C77DFF;
    --text: #E8E8FF;
    --muted: #7070AA;
    --border: rgba(255,209,102,0.2);
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(199,125,255,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 100% 80%, rgba(255,107,157,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at -10% 60%, rgba(6,214,160,0.10) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--d) ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to { opacity: 0.9; transform: scale(1.2); }
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--gold), #FF9A3C);
    color: var(--deep);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: 3px;
    padding: 6px 20px;
    border-radius: 100px;
    margin-bottom: 20px;
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 900;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold) 0%, #FF9A3C 40%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }
  .header p {
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.6;
  }
  .card-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed rgba(255,209,102,0.3);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    background: rgba(255,209,102,0.02);
  }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: rgba(255,209,102,0.06);
    transform: translateY(-2px);
  }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }
  .upload-icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: block;
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }
  .upload-zone h3 {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 6px;
  }
  .upload-zone p {
    color: var(--muted);
    font-size: 13px;
  }
  .file-types {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .file-tag {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }

  /* Google Sheets */
  .sheets-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .sheets-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .sheets-input:focus {
    border-color: var(--gold);
  }
  .sheets-input::placeholder { color: var(--muted); }
  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #FF9A3C);
    color: var(--deep);
  }
  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,209,102,0.3); }
  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stat-chip {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-chip .num {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 16px;
    color: var(--gold);
  }

  /* Controls */
  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 16px;
  }
  .control-group label {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }
  .control-group input[type="number"] {
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 20px;
    width: 60px;
    outline: none;
    text-align: center;
  }
  .num-btn {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--gold);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .num-btn:hover { background: rgba(255,209,102,0.1); }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
  }
  .toggle {
    position: relative;
    width: 44px; height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    cursor: pointer;
    transition: 0.3s;
  }
  .toggle-slider::before {
    content: '';
    position: absolute;
    width: 18px; height: 18px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, var(--gold), #FF9A3C); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }
  .toggle-label { font-size: 14px; }

  /* Entry table */
  .table-wrap {
    max-height: 280px;
    overflow-y: auto;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .table-wrap::-webkit-scrollbar { width: 4px; }
  .table-wrap::-webkit-scrollbar-track { background: transparent; }
  .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,209,102,0.3); border-radius: 4px; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead tr {
    background: rgba(255,255,255,0.04);
    position: sticky;
    top: 0;
    z-index: 1;
  }
  th {
    padding: 10px 14px;
    text-align: left;
    color: var(--muted);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  td {
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr.duplicate-row { opacity: 0.4; }
  tr.duplicate-row td:first-child::before {
    content: '⚠️ ';
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--border);
  }
  .avatar-fallback {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Zen Maru Gothic', sans-serif;
    flex-shrink: 0;
  }
  .cell-name {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .del-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: none;
    background: rgba(255,100,100,0.1);
    color: #FF6464;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .del-btn:hover { background: rgba(255,100,100,0.25); }

  /* Draw button */
  .draw-section {
    text-align: center;
    padding: 12px 0;
  }
  .btn-draw {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #FFD166, #FF9A3C, #FF6B9D);
    background-size: 200%;
    color: var(--deep);
    border: none;
    border-radius: 100px;
    padding: 18px 48px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 20px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-draw::before {
    content: '';
    position: absolute;
    inset: -2px;
    background: linear-gradient(135deg, #FFD166, #FF6B9D, #C77DFF, #FFD166);
    border-radius: 100px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
    animation: borderSpin 3s linear infinite;
  }
  @keyframes borderSpin {
    from { background-position: 0% 50%; }
    to { background-position: 200% 50%; }
  }
  .btn-draw:hover {
    transform: scale(1.04) translateY(-3px);
    box-shadow: 0 16px 48px rgba(255,209,102,0.4);
  }
  .btn-draw:active { transform: scale(0.98); }
  .btn-draw:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }
  .draw-icon {
    font-size: 24px;
    animation: spin 4s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .btn-draw:hover .draw-icon { animation-duration: 0.5s; }

  /* Rolling animation */
  .rolling {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
    display: none;
  }
  .rolling.active { display: block; }
  .rolling-name {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    animation: flicker 0.08s infinite;
    min-height: 2.5rem;
  }
  @keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.6; }
    100% { opacity: 1; }
  }

  /* Results */
  .results-section { display: none; }
  .results-section.active { display: block; }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: gap;
    gap: 12px;
  }
  .results-header h2 {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .results-actions {
    display: flex;
    gap: 8px;
  }
  .winners-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .winner-card {
    background: var(--surface);
    border: 1px solid rgba(255,209,102,0.25);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.5) rotate(-5deg); }
    to { opacity: 1; transform: scale(1) rotate(0deg); }
  }
  .winner-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--accent));
  }
  .winner-rank {
    position: absolute;
    top: 10px; right: 10px;
    width: 24px; height: 24px;
    background: linear-gradient(135deg, var(--gold), #FF9A3C);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 11px;
    color: var(--deep);
  }
  .winner-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 12px;
    border: 2px solid var(--gold);
    object-fit: cover;
    display: block;
  }
  .winner-avatar-fallback {
    width: 64px; height: 64px;
    border-radius: 50%;
    margin: 0 auto 12px;
    background: linear-gradient(135deg, var(--purple), var(--accent));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    font-weight: 900;
    font-family: 'Zen Maru Gothic', sans-serif;
    border: 2px solid var(--gold);
  }
  .winner-name {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
  }
  .winner-comment {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .copy-text-box {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 16px;
    font-size: 13px;
    color: var(--muted);
    white-space: pre-wrap;
    line-height: 1.8;
    word-break: break-all;
  }
  .btn-copy {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(6,214,160,0.15);
    border: 1px solid rgba(6,214,160,0.3);
    color: var(--blue);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-copy:hover { background: rgba(6,214,160,0.25); transform: translateY(-1px); }
  .btn-copy.copied {
    background: rgba(6,214,160,0.3);
    border-color: var(--blue);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    top: -20px;
    pointer-events: none;
    z-index: 9999;
    animation: confettiFall linear both;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  .section-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 8px 0 20px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card);
    border: 1px solid var(--blue);
    color: var(--blue);
    padding: 12px 24px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 700;
    opacity: 0;
    transition: all 0.3s;
    z-index: 9999;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .warn {
    font-size: 12px;
    color: var(--accent);
    margin-top: 8px;
    display: none;
  }
  .warn.active { display: block; }

  @media (max-width: 600px) {
    .controls-row { flex-direction: column; align-items: stretch; }
    .control-group { justify-content: space-between; }
    .winners-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="badge">✦ Lucky Draw ✦</div>
    <h1>✨ 幸運抽獎機</h1>
    <p>匯入名單，設定人數，一鍵抽出幸運兒</p>
  </div>

  <!-- Upload Card -->
  <div class="card">
    <div class="card-title"><span class="dot"></span>匯入名單</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".csv,.xlsx,.xls">
      <span class="upload-icon">📂</span>
      <h3>拖曳或點擊上傳檔案</h3>
      <p>支援 CSV、Excel 格式</p>
      <div class="file-types">
        <span class="file-tag">📄 .CSV</span>
        <span class="file-tag">📊 .XLSX</span>
        <span class="file-tag">📊 .XLS</span>
      </div>
    </div>

    <div style="margin: 16px 0; display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px;">
      <div style="flex:1; height:1px; background: rgba(255,255,255,0.08);"></div>
      或透過 Google 試算表網址匯入
      <div style="flex:1; height:1px; background: rgba(255,255,255,0.08);"></div>
    </div>
    <div class="sheets-row">
      <input class="sheets-input" id="sheetsUrl" type="text" placeholder="貼上 Google 試算表公開連結…">
      <button class="btn btn-gold" onclick="loadSheets()">匯入</button>
    </div>
    <p style="font-size: 11px; color: var(--muted); margin-top: 8px;">⚠️ 試算表需設為「知道連結的人均可檢視」</p>
  </div>

  <!-- Data Preview Card -->
  <div class="card" id="dataCard" style="display:none;">
    <div class="card-title"><span class="dot"></span>名單預覽</div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="dedupeToggle" onchange="applyDedupe()">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label">🔍 自動移除重複姓名</span>
    </div>
    <p class="warn" id="dedupeWarn"></p>

    <div class="section-divider"></div>

    <div class="table-wrap">
      <table id="previewTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Draw Settings -->
  <div class="card" id="drawCard" style="display:none;">
    <div class="card-title"><span class="dot"></span>抽獎設定</div>
    <div class="controls-row">
      <div class="control-group">
        <label>抽出人數</label>
        <button class="num-btn" onclick="changeCount(-1)">−</button>
        <input type="number" id="drawCount" value="1" min="1">
        <button class="num-btn" onclick="changeCount(1)">+</button>
      </div>
      <div class="toggle-row" style="flex:1; padding: 0 8px;">
        <label class="toggle">
          <input type="checkbox" id="noRepeatToggle" checked>
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label" style="font-size:13px;">不重複抽出</span>
      </div>
    </div>
    <p class="warn" id="countWarn"></p>

    <div class="section-divider"></div>

    <div class="draw-section">
      <button class="btn-draw" id="drawBtn" onclick="startDraw()">
        <span class="draw-icon">🎰</span>
        開始抽獎！
      </button>
    </div>
  </div>

  <!-- Rolling animation -->
  <div class="rolling" id="rollingDiv">
    <div style="font-size: 12px; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px;">✦ 命運之輪正在轉動 ✦</div>
    <div class="rolling-name" id="rollingName">???</div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="card">
      <div class="results-header">
        <h2>🏆 抽獎結果</h2>
        <div class="results-actions">
          <button class="btn-copy" id="copyBtn" onclick="copyResults()">📋 一鍵複製</button>
          <button class="btn btn-outline" onclick="exportCSV()">⬇️ CSV</button>
          <button class="btn btn-outline" onclick="exportImage()">🖼️ 圖片</button>
          <button class="btn btn-outline" onclick="resetDraw()">🔄 重新抽</button>
        </div>
      </div>
      <div class="winners-grid" id="winnersGrid"></div>
      <div class="copy-text-box" id="copyTextBox"></div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">✅ 已複製到剪貼簿！</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── Stars ──────────────────────────────────────────────
(function() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${Math.random()*4+2}s;
      animation-delay:${Math.random()*4}s;
    `;
    stars.appendChild(s);
  }
})();

// ── State ─────────────────────────────────────────────
let allEntries = [];     // raw parsed entries
let activeEntries = [];  // after dedupe filter
let cols = {};           // { name, comment, photo } → column key

// ── File Upload ────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => parseCSV(e.target.result);
    reader.readAsText(file, 'UTF-8');
  } else if (ext === 'xlsx' || ext === 'xls') {
    const reader = new FileReader();
    reader.onload = e => parseExcel(e.target.result);
    reader.readAsArrayBuffer(file);
  } else {
    showToast('❌ 不支援的檔案格式', true);
  }
}

function parseCSV(text) {
  const result = Papa.parse(text, { header: true, skipEmptyLines: true });
  loadData(result.data);
}

function parseExcel(buffer) {
  const wb = XLSX.read(buffer, { type: 'arraybuffer' });
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws, { defval: '' });
  loadData(data);
}

async function loadSheets() {
  let url = document.getElementById('sheetsUrl').value.trim();
  if (!url) return;

  // Extract spreadsheet ID
  const match = url.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
  if (!match) { showToast('❌ 請貼上正確的 Google 試算表連結', true); return; }

  const id = match[1];
  // Try to get gid
  const gidMatch = url.match(/gid=(\d+)/);
  const gid = gidMatch ? gidMatch[1] : '0';

  const csvUrl = `https://docs.google.com/spreadsheets/d/${id}/export?format=csv&gid=${gid}`;
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error();
    const text = await res.text();
    parseCSV(text);
  } catch {
    showToast('❌ 無法讀取，請確認試算表已設為公開', true);
  }
}

// ── Data Processing ────────────────────────────────────
function detectCols(keys) {
  cols = {};
  const namePatterns = ['姓名','名字','name','名稱','用戶','帳號','account','user','參與者'];
  const commentPatterns = ['留言','comment','message','內容','回覆','備註'];
  const photoPatterns = ['照片','photo','image','picture','avatar','頭像','img','url'];

  keys.forEach(k => {
    const kl = k.toLowerCase();
    if (!cols.name && namePatterns.some(p => kl.includes(p))) cols.name = k;
    if (!cols.comment && commentPatterns.some(p => kl.includes(p))) cols.comment = k;
    if (!cols.photo && photoPatterns.some(p => kl.includes(p))) cols.photo = k;
  });

  // fallback: first column
  if (!cols.name && keys.length > 0) cols.name = keys[0];
}

function loadData(data) {
  if (!data || data.length === 0) { showToast('❌ 沒有找到資料', true); return; }
  const keys = Object.keys(data[0]);
  detectCols(keys);
  allEntries = data.map((row, i) => ({ ...row, _id: i }));
  applyDedupe();
  document.getElementById('dataCard').style.display = 'block';
  document.getElementById('drawCard').style.display = 'block';
  renderTable();
  updateStats();
  showToast(`✅ 成功匯入 ${allEntries.length} 筆資料`);
}

function applyDedupe() {
  const on = document.getElementById('dedupeToggle').checked;
  if (on && cols.name) {
    const seen = new Set();
    let dupes = 0;
    activeEntries = [];
    allEntries.forEach(row => {
      const key = (row[cols.name] || '').trim();
      if (seen.has(key)) { dupes++; }
      else { seen.add(key); activeEntries.push(row); }
    });
    const warn = document.getElementById('dedupeWarn');
    if (dupes > 0) {
      warn.textContent = `⚠️ 已移除 ${dupes} 筆重複資料，剩餘 ${activeEntries.length} 筆`;
      warn.classList.add('active');
    } else {
      warn.textContent = '✅ 無重複資料';
      warn.classList.add('active');
    }
  } else {
    activeEntries = [...allEntries];
    document.getElementById('dedupeWarn').classList.remove('active');
  }
  renderTable();
  updateStats();
}

function updateStats() {
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip">總筆數 <span class="num">${allEntries.length}</span></div>
    <div class="stat-chip">有效參與 <span class="num">${activeEntries.length}</span></div>
    ${cols.name ? `<div class="stat-chip">姓名欄：<span class="num" style="font-size:12px;letter-spacing:0;">${cols.name}</span></div>` : ''}
  `;
}

function renderTable() {
  const head = document.getElementById('tableHead');
  const body = document.getElementById('tableBody');
  if (!allEntries.length) return;

  const keys = Object.keys(allEntries[0]).filter(k => k !== '_id');
  head.innerHTML = `<tr>
    ${cols.photo ? '<th>照片</th>' : ''}
    ${keys.filter(k => k !== (cols.photo||'__none__')).slice(0,5).map(k => `<th>${k}</th>`).join('')}
    <th></th>
  </tr>`;

  const activeIds = new Set(activeEntries.map(r => r._id));
  body.innerHTML = allEntries.slice(0, 200).map(row => {
    const isDupe = !activeIds.has(row._id);
    const displayKeys = keys.filter(k => k !== (cols.photo||'__none__')).slice(0,5);
    const photoVal = cols.photo ? (row[cols.photo] || '') : '';
    const photoCell = cols.photo ? `<td>${photoVal ? `<img class="avatar" src="${photoVal}" onerror="this.style.display='none'">` : '<div class="avatar-fallback" style="width:32px;height:32px;font-size:12px;">?</div>'}</td>` : '';
    return `<tr class="${isDupe ? 'duplicate-row' : ''}">
      ${photoCell}
      ${displayKeys.map(k => `<td style="max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${row[k] || ''}</td>`).join('')}
      <td><button class="del-btn" onclick="deleteEntry(${row._id})" title="移除此筆">✕</button></td>
    </tr>`;
  }).join('');
}

function deleteEntry(id) {
  allEntries = allEntries.filter(r => r._id !== id);
  applyDedupe();
  updateStats();
}

// ── Draw ───────────────────────────────────────────────
function changeCount(delta) {
  const inp = document.getElementById('drawCount');
  const val = Math.max(1, parseInt(inp.value) + delta);
  inp.value = val;
  validateCount();
}

function validateCount() {
  const count = parseInt(document.getElementById('drawCount').value) || 1;
  const warn = document.getElementById('countWarn');
  if (count > activeEntries.length) {
    warn.textContent = `⚠️ 抽獎人數不可超過名單人數（${activeEntries.length} 人）`;
    warn.classList.add('active');
    document.getElementById('drawBtn').disabled = true;
  } else {
    warn.classList.remove('active');
    document.getElementById('drawBtn').disabled = false;
  }
}

document.getElementById('drawCount').addEventListener('input', validateCount);

async function startDraw() {
  validateCount();
  const count = parseInt(document.getElementById('drawCount').value) || 1;
  if (count > activeEntries.length) return;

  document.getElementById('resultsSection').classList.remove('active');
  const rolling = document.getElementById('rollingDiv');
  const rollingName = document.getElementById('rollingName');
  rolling.classList.add('active');
  document.getElementById('drawBtn').disabled = true;

  // Animate rolling
  const pool = [...activeEntries];
  const duration = 2000;
  const start = Date.now();
  await new Promise(resolve => {
    const tick = () => {
      rollingName.textContent = (pool[Math.floor(Math.random() * pool.length)][cols.name] || '???');
      if (Date.now() - start < duration) requestAnimationFrame(tick);
      else resolve();
    };
    requestAnimationFrame(tick);
  });

  // Pick winners
  const noRepeat = document.getElementById('noRepeatToggle').checked;
  const winners = [];
  const used = new Set();
  while (winners.length < count) {
    const idx = Math.floor(Math.random() * pool.length);
    if (!noRepeat || !used.has(idx)) {
      used.add(idx);
      winners.push(pool[idx]);
    }
    if (noRepeat && used.size >= pool.length) break;
  }

  rollingName.textContent = winners[0][cols.name] || '幸運兒';

  await new Promise(r => setTimeout(r, 600));
  rolling.classList.remove('active');
  document.getElementById('drawBtn').disabled = false;

  showResults(winners);
  launchConfetti();
}

function showResults(winners) {
  window._lastWinners = winners;
  const grid = document.getElementById('winnersGrid');
  const textBox = document.getElementById('copyTextBox');
  const section = document.getElementById('resultsSection');

  grid.innerHTML = winners.map((w, i) => {
    const name = w[cols.name] || '—';
    const comment = cols.comment ? (w[cols.comment] || '') : '';
    const photo = cols.photo ? (w[cols.photo] || '') : '';
    const initial = name.charAt(0);
    const avatarEl = photo
      ? `<img class="winner-avatar" src="${photo}" onerror="this.outerHTML='<div class=\\'winner-avatar-fallback\\'>${initial}</div>'">`
      : `<div class="winner-avatar-fallback">${initial}</div>`;
    return `<div class="winner-card" style="animation-delay:${i * 0.12}s">
      <div class="winner-rank">${i + 1}</div>
      ${avatarEl}
      <div class="winner-name">${name}</div>
      ${comment ? `<div class="winner-comment">${comment}</div>` : ''}
    </div>`;
  }).join('');

  const now = new Date().toLocaleString('zh-TW');
  textBox.textContent = `🏆 抽獎結果（${now}）\n${'─'.repeat(30)}\n` +
    winners.map((w, i) => {
      const name = w[cols.name] || '—';
      const comment = cols.comment ? (w[cols.comment] ? `  💬 ${w[cols.comment]}` : '') : '';
      return `第 ${i+1} 名：${name}${comment}`;
    }).join('\n');

  section.classList.add('active');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyResults() {
  const text = document.getElementById('copyTextBox').textContent;

  function onSuccess() {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 已複製！';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 一鍵複製'; btn.classList.remove('copied'); }, 2000);
    showToast('✅ 已複製到剪貼簿！');
  }

  // Primary: modern clipboard API
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onSuccess).catch(() => fallbackCopy(text, onSuccess));
  } else {
    fallbackCopy(text, onSuccess);
  }
}

function fallbackCopy(text, onSuccess) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    onSuccess();
  } catch(e) {
    showToast('❌ 複製失敗，請手動選取文字複製', true);
  }
  document.body.removeChild(ta);
}

// ── Export CSV ─────────────────────────────────────────
function exportCSV() {
  if (!window._lastWinners || !window._lastWinners.length) { showToast('❌ 尚無抽獎結果', true); return; }
  const winners = window._lastWinners;
  const now = new Date();
  const dateStr = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;

  const headers = ['名次', cols.name || '姓名'];
  if (cols.comment) headers.push('留言');
  if (cols.photo) headers.push('照片');

  const rows = winners.map((w, i) => {
    const row = [i + 1, w[cols.name] || ''];
    if (cols.comment) row.push(w[cols.comment] || '');
    if (cols.photo) row.push(w[cols.photo] || '');
    return row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
  });

  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `抽獎結果_${dateStr}.csv`;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); document.body.removeChild(a); }, 1000);
  showToast('✅ CSV 已下載！');
}

// ── Export Image ───────────────────────────────────────
async function exportImage() {
  if (!window._lastWinners || !window._lastWinners.length) { showToast('❌ 尚無抽獎結果', true); return; }

  showToast('🖼️ 圖片生成中…');

  // Build an off-screen render target
  const now = new Date().toLocaleString('zh-TW');
  const winners = window._lastWinners;

  const wrap = document.createElement('div');
  wrap.style.cssText = `
    position:fixed; left:-9999px; top:0;
    width:640px; padding:48px 40px 48px;
    background: linear-gradient(145deg, #0D0D1A 0%, #13132A 60%, #1C1C38 100%);
    font-family: 'Noto Sans TC', 'Zen Maru Gothic', sans-serif;
    color: #E8E8FF;
    border-radius: 20px;
  `;

  const cardsHTML = winners.map((w, i) => {
    const name = w[cols.name] || '—';
    const comment = cols.comment ? (w[cols.comment] || '') : '';
    const photo = cols.photo ? (w[cols.photo] || '') : '';
    const initial = name.charAt(0);
    const medals = ['🥇','🥈','🥉'];
    const medal = medals[i] || `${i+1}`;
    const imgEl = photo
      ? `<img src="${photo}" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid #FFD166;flex-shrink:0;" crossorigin="anonymous">`
      : `<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#C77DFF,#FF6B9D);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;flex-shrink:0;border:2px solid #FFD166;">${initial}</div>`;
    return `<div style="display:flex;align-items:center;gap:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,209,102,0.2);border-radius:12px;padding:14px 18px;margin-bottom:12px;">
      <div style="font-size:26px;min-width:36px;text-align:center;">${medal}</div>
      ${imgEl}
      <div style="flex:1;overflow:hidden;">
        <div style="font-weight:700;font-size:16px;margin-bottom:4px;">${name}</div>
        ${comment ? `<div style="font-size:12px;color:#7070AA;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${comment}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  wrap.innerHTML = `
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:13px;letter-spacing:3px;color:#FFD166;margin-bottom:10px;">✦ LUCKY DRAW ✦</div>
      <div style="font-size:32px;font-weight:900;background:linear-gradient(135deg,#FFD166,#FF6B9D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">🏆 抽獎結果</div>
      <div style="font-size:12px;color:#7070AA;margin-top:8px;">${now}</div>
    </div>
    ${cardsHTML}
    <div style="text-align:center;margin-top:28px;font-size:11px;color:#3A3A60;letter-spacing:1px;">✦ 幸運抽獎機 ✦</div>
  `;

  document.body.appendChild(wrap);
  await new Promise(r => setTimeout(r, 300)); // wait for fonts/images

  try {
    const canvas = await html2canvas(wrap, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false,
    });
    const dateStr = now.replace(/[/:]/g, '').replace(/\s/g, '_');
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = `抽獎結果_${dateStr}.png`;
    a.click();
    showToast('✅ 圖片已下載！');
  } catch(e) {
    showToast('❌ 圖片生成失敗', true);
  } finally {
    document.body.removeChild(wrap);
  }
}

function resetDraw() {
  document.getElementById('resultsSection').classList.remove('active');
}

// ── Confetti ───────────────────────────────────────────
function launchConfetti() {
  const colors = ['#FFD166','#FF6B9D','#06D6A0','#C77DFF','#FF9A3C','#ffffff'];
  const shapes = ['circle','square','triangle'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const color = colors[Math.floor(Math.random() * colors.length)];
      const shape = shapes[Math.floor(Math.random() * shapes.length)];
      const size = Math.random() * 10 + 6;
      el.style.cssText = `
        left: ${Math.random() * 100}vw;
        background: ${color};
        width: ${size}px; height: ${size}px;
        border-radius: ${shape === 'circle' ? '50%' : shape === 'square' ? '2px' : '0'};
        clip-path: ${shape === 'triangle' ? 'polygon(50% 0%, 0% 100%, 100% 100%)' : 'none'};
        animation-duration: ${Math.random() * 2 + 2}s;
        animation-delay: ${Math.random() * 0.8}s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 30);
  }
}

// ── Toast ──────────────────────────────────────────────
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isError ? 'var(--accent)' : 'var(--blue)';
  t.style.color = isError ? 'var(--accent)' : 'var(--blue)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
